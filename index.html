<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мудрец</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3c72">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧙</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; display: flex; flex-direction: column; color: #fff; }
        header { padding: 20px 16px 10px; text-align: center; }
        header h1 { font-size: 28px; font-weight: 400; letter-spacing: 2px; color: #ffd966; }
        .sage-selector { display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 16px; background: rgba(255,255,255,0.1); justify-content: center; }
        .sage-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 10px 18px; font-size: 15px; color: #fff; backdrop-filter: blur(10px); cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .sage-btn.active { background: #ffd966; color: #1e3c72; border-color: #ffd966; font-weight: 600; }
        .chat-container { flex: 1; background: rgba(0,0,0,0.3); backdrop-filter: blur(15px); margin: 16px; border-radius: 20px; padding: 16px; overflow-y: auto; min-height: 300px; }
        .message { margin-bottom: 14px; display: flex; flex-direction: column; }
        .message.user { align-items: flex-end; } .message.sage { align-items: flex-start; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 16px; line-height: 1.4; word-wrap: break-word; }
        .user .bubble { background: #ffd966; color: #1e3c72; }
        .sage .bubble { background: rgba(255,255,255,0.15); color: #fff; }
        .sender-label { font-size: 12px; margin-bottom: 4px; opacity: 0.7; }
        .input-area { display: flex; gap: 10px; padding: 12px 16px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); }
        .input-area input { flex: 1; padding: 14px 18px; border-radius: 30px; border: none; background: rgba(255,255,255,0.12); color: #fff; font-size: 16px; outline: none; }
        .input-area button { background: #ffd966; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; color: #1e3c72; cursor: pointer; }
        .loading-dots span { display: inline-block; width: 8px; height: 8px; margin: 0 2px; background: #ffd966; border-radius: 50%; animation: blink 1.4s infinite both; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; } .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>
    <header><h1>🌿 Мудрец</h1></header>
    <div class="sage-selector" id="sageSelector">
        <button class="sage-btn" data-sage="islam">☪️ Мудрец Ислама</button>
        <button class="sage-btn" data-sage="transurfing">🌀 Мудрец Трансерфинга</button>
        <button class="sage-btn" data-sage="stoicism">🏛️ Мудрец Стоицизма</button>
        <button class="sage-btn" data-sage="buddhism">☸️ Мудрец Буддизма</button>
        <button class="sage-btn" data-sage="orthodoxy">✝️ Мудрец Православия</button>
    </div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Задай вопрос мудрецу..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>
    <script>
        // ========== ТВОЙ API-КЛЮЧ ==========
        const DEEPSEEK_API_KEY = 'sk-ded18ed942a345b7845c2d5ee6978de2';
        const API_URL = 'https://api.deepseek.com/v1/chat/completions';

        const sagePrompts = {
            islam: `Ты — Мудрец Ислама, глубоко знающий Коран, сунну и исламское богословие. Отвечай на вопросы пользователя, опираясь исключительно на священные тексты и труды признанных исламских учёных. В начале каждого ответа приводи уместный аят или хадис. Если вопрос касается медицины, техники или права в бытовом смысле, подчеркни, что ты не специалист, но дай наставление, связанное с верой. Тон — уважительный, спокойный, ободряющий.`,
            transurfing: `Ты — Мудрец Трансерфинга, знаток учения Вадима Зеланда. Отвечай через призму Трансерфинга реальности: маятники, избыточные потенциалы, важность, внешнее намерение. Цитируй ключевые идеи. По вопросам здоровья напоминай, что тело принадлежит этому миру и нужно обращаться к врачам, но дух может оставаться Смотрителем. Тон — лёгкий, метафоричный.`,
            stoicism: `Ты — Мудрец Стоицизма, последователь Эпиктета, Сенеки, Марка Аврелия. Мудрость основана на различении того, что в нашей власти и что нет, на добродетели. Отвечай цитатами стоиков. В практических вопросах советуй благоразумие и обращение к профессионалам. Тон — твёрдый, рациональный, с состраданием.`,
            buddhism: `Ты — Мудрец Буддизма. Опирайся на Четыре Благородные Истины, Восьмеричный путь, учение о непостоянстве. Приводи примеры из Дхаммапады. В вопросах практического характера напоминай о Срединном пути. Тон — мягкий, созерцательный.`,
            orthodoxy: `Ты — Мудрец Православия (старец). Ответы основаны на Писании и трудах святых отцов. Начинай с цитаты из Библии или отцов. Говори о борьбе со страстями, молитве, смирении. В практических вопросах напоминай, что Бог дал людям врачей и мастеров. Тон — отеческий, тёплый, строгий в истине, но милующий.`
        };
        const sageNames = { islam: 'Мудрец Ислама', transurfing: 'Мудрец Трансерфинга', stoicism: 'Мудрец Стоицизма', buddhism: 'Мудрец Буддизма', orthodoxy: 'Мудрец Православия' };

        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        let currentSage = 'islam';
        const conversationHistory = { islam: [], transurfing: [], stoicism: [], buddhism: [], orthodoxy: [] };

        function appendMessage(text, sender, sageName = '') {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'user' ? 'user' : 'sage');
            const label = document.createElement('div'); label.classList.add('sender-label');
            label.textContent = sender === 'user' ? 'Вы' : (sageName || 'Мудрец');
            const bubble = document.createElement('div'); bubble.classList.add('bubble'); bubble.textContent = text;
            msgDiv.appendChild(label); msgDiv.appendChild(bubble);
            chatContainer.appendChild(msgDiv); chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        function appendSystemMessage(text) {
            const msgDiv = document.createElement('div'); msgDiv.style.textAlign = 'center'; msgDiv.style.fontSize = '13px'; msgDiv.style.opacity = '0.7'; msgDiv.style.margin = '8px 0'; msgDiv.textContent = text;
            chatContainer.appendChild(msgDiv); chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        function showLoading() {
            const loader = document.createElement('div'); loader.classList.add('message', 'sage'); loader.id = 'loader';
            const label = document.createElement('div'); label.classList.add('sender-label'); label.textContent = sageNames[currentSage] || 'Мудрец';
            const bubble = document.createElement('div'); bubble.classList.add('bubble'); bubble.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
            loader.appendChild(label); loader.appendChild(bubble);
            chatContainer.appendChild(loader); chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        function removeLoading() { const l = document.getElementById('loader'); if (l) l.remove(); }

        document.querySelector('.sage-btn[data-sage="islam"]').classList.add('active');
        appendSystemMessage('☪️ Мудрец Ислама');

        document.querySelectorAll('.sage-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sage-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSage = btn.getAttribute('data-sage');
                appendSystemMessage('Вы говорите с ' + sageNames[currentSage]);
            });
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            appendMessage(text, 'user');
            userInput.value = '';
            conversationHistory[currentSage].push({ role: 'user', content: text });
            showLoading();
            try {
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer sk-ded18ed942a345b7845c2d5ee6978de2' },
                    body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'system', content: sagePrompts[currentSage] }, ...conversationHistory[currentSage]], temperature: 0.8, max_tokens: 800 })
                });
                const data = await resp.json();
                removeLoading();
                if (!resp.ok) throw new Error(data.error?.message || 'Ошибка');
                const reply = data.choices[0].message.content;
                appendMessage(reply, 'sage', sageNames[currentSage]);
                conversationHistory[currentSage].push({ role: 'assistant', content: reply });
            } catch (e) {
                removeLoading();
                console.error(e);
                appendSystemMessage('⚠️ Мудрец временно недоступен. Проверьте ключ или интернет.');
                conversationHistory[currentSage].pop();
            }
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js').catch(function(){});
            });
        }
    </script>
</body>
</html>
