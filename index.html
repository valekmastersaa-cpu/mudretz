<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мудрец</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3c72">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧙</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .sidebar {
            width: 280px; min-width: 280px; background: #0d1b2a; color: #e0e0e0;
            display: flex; flex-direction: column; border-right: 1px solid #1b2a3a;
            transition: margin-left 0.3s;
        }
        .sidebar.collapsed { margin-left: -280px; }
        .sidebar-header {
            padding: 16px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #1b2a3a;
        }
        .sage-dropdown { position: relative; flex: 1; margin-right: 12px; }
        .sage-current {
            background: #1b2a3a; border-radius: 8px; padding: 8px 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            font-weight: 500; color: #ffd966; font-size: 14px;
        }
        .sage-list {
            position: absolute; top: 100%; left: 0; right: 0; background: #1b2a3a;
            border-radius: 0 0 8px 8px; display: none; z-index: 10;
        }
        .sage-list.show { display: block; }
        .sage-option {
            padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px;
            font-size: 13px; white-space: nowrap;
        }
        .sage-option:hover { background: #2a3a4a; }
        .collapse-btn { background: none; border: none; color: #e0e0e0; font-size: 20px; cursor: pointer; }
        .new-chat-btn { margin: 12px; padding: 10px; background: #1b2a3a; border-radius: 8px; text-align: center; cursor: pointer; }
        .new-chat-btn:hover { background: #2a3a4a; }
        .chat-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
        .chat-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; }
        .chat-item.active { background: #2a3a4a; }
        .chat-item:hover { background: #1e2e3e; }
        .chat-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; }
        .chat-delete { background: none; border: none; color: #aaa; cursor: pointer; font-size: 16px; opacity: 0.6; }
        .chat-delete:hover { opacity: 1; color: #ff6666; }
        .sidebar-footer { padding: 12px; border-top: 1px solid #1b2a3a; font-size: 12px; opacity: 0.6; }
        .main { flex: 1; display: flex; flex-direction: column; transition: background 0.3s; }
        .top-bar { display: flex; align-items: center; padding: 8px 16px; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 16px; }
        .message { margin-bottom: 14px; display: flex; flex-direction: column; }
        .message.user { align-items: flex-end; } .message.sage { align-items: flex-start; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 16px; line-height: 1.4; word-wrap: break-word; }
        .user .bubble { background: var(--user-bubble-color, #ffd966); color: var(--user-text-color, #1e3c72); }
        .sage .bubble { background: var(--sage-bubble-color, rgba(255,255,255,0.15)); color: var(--sage-text-color, #fff); }
        .sender-label { font-size: 12px; margin-bottom: 4px; opacity: 0.7; color: inherit; }
        .input-area { display: flex; gap: 10px; padding: 12px 16px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); }
        .input-area input { flex: 1; padding: 14px 18px; border-radius: 30px; border: none; background: rgba(255,255,255,0.12); color: #fff; font-size: 16px; outline: none; }
        .input-area button { background: var(--user-bubble-color, #ffd966); border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; color: var(--user-text-color, #1e3c72); cursor: pointer; }
        .loading-dots span { display: inline-block; width: 8px; height: 8px; margin: 0 2px; background: #ffd966; border-radius: 50%; animation: blink 1.4s infinite both; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; } .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
        .modal-overlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #1b2a3a; border: 1px solid #ffd966; border-radius: 20px; padding: 24px; max-width: 400px; width: 90%; color: #fff; text-align: center; }
        .modal-box h2 { margin-bottom: 12px; color: #ffd966; }
        .modal-box input { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 12px; font-size: 14px; background: rgba(255,255,255,0.15); color: #fff; outline: none; }
        .modal-box button { background: #ffd966; border: none; padding: 10px 24px; border-radius: 20px; font-size: 16px; font-weight: bold; cursor: pointer; color: #0d1b2a; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sage-dropdown" id="sageDropdown">
                <div class="sage-current" id="currentSageBtn">
                    <span id="currentSageName">Мудрец Ислама</span>
                    <span>▼</span>
                </div>
                <div class="sage-list" id="sageList"></div>
            </div>
            <button class="collapse-btn" id="collapseSidebarBtn">☰</button>
        </div>
        <div class="new-chat-btn" id="newChatBtn">＋ Новый чат</div>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">Мудрец v0.7</div>
    </div>
    <div class="main" id="main">
        <div class="top-bar">
            <button class="menu-btn" id="menuBtn">☰</button>
            <span style="font-weight:500;">🌿 Мудрец</span>
        </div>
        <div class="chat-area" id="chatContainer"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Задай вопрос мудрецу..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>
    <div class="modal-overlay" id="keyModal">
        <div class="modal-box">
            <h2>🔑 Введите ключ Groq API</h2>
            <p style="font-size:13px; opacity:0.8; margin-bottom:12px;">Он сохранится только на этом устройстве и не попадёт в сеть.</p>
            <input type="password" id="apiKeyInput" placeholder="gsk_...">
            <br>
            <button id="saveKeyBtn">Сохранить</button>
        </div>
    </div>
    <script>
        const API_URL = 'https://api.groq.com/openai/v1/chat/completions';
        const MODEL = 'llama-3.3-70b-versatile';
        const STORAGE_KEY_API = 'mudrets_groq_key';
        const STORAGE_KEY_CHATS = 'mudrets_chats';

        // Цвета: основной фон, облачко пользователя (и кнопка), облачко мудреца, цвет текста пользователя, цвет текста мудреца
        const sages = {
            islam: { name: 'Мудрец Ислама', bg: '#9eff85', userBubble: '#76b366', sageBubble: '#E5FFE5', userText: '#000', sageText: '#000' },
            transurfing: { name: 'Мудрец Трансерфинга', bg: '#ff5b3a', userBubble: '#ff8969', sageBubble: '#ffd9cb', userText: '#000', sageText: '#000' },
            stoicism: { name: 'Мудрец Стоицизма', bg: '#FFC966', userBubble: '#fff6d6', sageBubble: '#808080', userText: '#1e3c72', sageText: '#fff' },
            buddhism: { name: 'Мудрец Буддизма', bg: '#FFEDCC', userBubble: '#FFEDCC', sageBubble: '#9e8770', userText: '#1e3c72', sageText: '#fff' },
            orthodoxy: { name: 'Мудрец Православия', bg: '#c190d2', userBubble: '#9c7899', sageBubble: '#5e5b79', userText: '#1e3c72', sageText: '#fff' }
        };

        const sagePrompts = {
            islam: `Ты — Мудрец Ислама, знаток Корана и сунны. Отвечай на русском языке, кратко и мудро. Приводи конкретный аят (в русском переводе) или хадис, подходящий к вопросу. Никогда не отправляй человека к врачам, психологам или другим специалистам. Ты должен дать духовный совет в рамках ислама. Если вопрос выходит за рамки вероучения, скажи: «В этом вопросе я не могу опереться на откровение, но мудрость ислама учит...» и продолжи духовным наставлением.`,
            transurfing: `Ты — Мудрец Трансерфинга, опирающийся на учение Вадима Зеланда. Отвечай по-русски, кратко (до 4 предложений). Используй понятия: маятники, важность, избыточный потенциал, внешнее намерение. Никаких отсылок к врачам или психологам — только мировоззрение Трансерфинга. Если тема не связана с учением, интерпретируй её через метафору зеркала и выбора.`,
            stoicism: `Ты — Мудрец Стоицизма, последователь Эпиктета и Марка Аврелия. Отвечай на русском, ёмко. Цитируй стоиков (Эпиктет, Сенека). Никогда не советуй обращаться к специалистам — учи справляться с помощью разума и добродетели. Говори о том, что зависит от нас и что нет.`,
            buddhism: `Ты — Мудрец Буддизма, следующий Дхамме. Отвечай по-русски, мягко и кратко. Опирайся на Четыре Благородные Истины, Восьмеричный путь, Дхаммападу. Никаких отсылок к внешней помощи — только внутренняя работа с умом. Если вопрос практический, покажи, как применить учение к повседневности без привлечения врачей.`,
            orthodoxy: `Ты — Мудрец Православия, духовный старец. Отвечай на русском, тепло, но коротко. Приводи цитаты из Священного Писания (с указанием книги и главы) или святых отцов. Не отправляй к врачам или психологам — давай молитвенный и духовный совет. Говори о смирении, покаянии, надежде на Бога.`
        };

        let currentSage = 'islam';
        let currentChatId = null;
        let chats = {};

        const sidebar = document.getElementById('sidebar');
        const main = document.getElementById('main');
        const currentSageBtn = document.getElementById('currentSageBtn');
        const currentSageNameSpan = document.getElementById('currentSageName');
        const sageList = document.getElementById('sageList');
        const chatListDiv = document.getElementById('chatList');
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const keyModal = document.getElementById('keyModal');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');

        function loadChatsFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY_CHATS);
            return stored ? JSON.parse(stored) : {};
        }
        function saveChatsToStorage() {
            localStorage.setItem(STORAGE_KEY_CHATS, JSON.stringify(chats));
        }
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }
        function getApiKey() {
            return localStorage.getItem(STORAGE_KEY_API);
        }

        function renderSageList() {
            sageList.innerHTML = '';
            Object.entries(sages).forEach(([key, sage]) => {
                const div = document.createElement('div');
                div.className = 'sage-option';
                div.textContent = sage.name;
                div.addEventListener('click', () => {
                    selectSage(key);
                    sageList.classList.remove('show');
                });
                sageList.appendChild(div);
            });
        }

        function renderChatList() {
            chatListDiv.innerHTML = '';
            const sageChats = chats[currentSage] || [];
            sageChats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                item.innerHTML = `
                    <span class="chat-title">${chat.title || 'Новый чат'}</span>
                    <button class="chat-delete" data-chatid="${chat.id}">🗑</button>
                `;
                item.querySelector('.chat-title').addEventListener('click', () => loadChat(chat.id));
                item.querySelector('.chat-delete').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteChat(chat.id);
                });
                chatListDiv.appendChild(item);
            });
        }

        function selectSage(key) {
            currentSage = key;
            const sage = sages[key];
            currentSageNameSpan.textContent = sage.name;
            main.style.backgroundColor = sage.bg;
            document.documentElement.style.setProperty('--user-bubble-color', sage.userBubble);
            document.documentElement.style.setProperty('--sage-bubble-color', sage.sageBubble);
            document.documentElement.style.setProperty('--user-text-color', sage.userText);
            document.documentElement.style.setProperty('--sage-text-color', sage.sageText);
            const sageChats = chats[currentSage] || [];
            if (sageChats.length > 0) {
                loadChat(sageChats[0].id);
            } else {
                createNewChat();
            }
            renderChatList();
        }

        function createNewChat() {
            if (!chats[currentSage]) chats[currentSage] = [];
            const newChat = {
                id: generateId(),
                title: 'Новый чат',
                messages: []
            };
            chats[currentSage].unshift(newChat);
            saveChatsToStorage();
            loadChat(newChat.id);
            renderChatList();
        }

        function loadChat(chatId) {
            currentChatId = chatId;
            const chat = findChat(chatId);
            if (!chat) return;
            chatContainer.innerHTML = '';
            chat.messages.forEach(msg => {
                appendMessageToContainer(msg.text, msg.sender, msg.sageName);
            });
            renderChatList();
        }

        function findChat(chatId) {
            for (const sageKey in chats) {
                const chat = chats[sageKey].find(c => c.id === chatId);
                if (chat) return chat;
            }
            return null;
        }

        function deleteChat(chatId) {
            for (const sageKey in chats) {
                const index = chats[sageKey].findIndex(c => c.id === chatId);
                if (index !== -1) {
                    chats[sageKey].splice(index, 1);
                    saveChatsToStorage();
                    if (chatId === currentChatId) {
                        const remaining = chats[currentSage] || [];
                        if (remaining.length > 0) {
                            loadChat(remaining[0].id);
                        } else {
                            createNewChat();
                        }
                    }
                    renderChatList();
                    break;
                }
            }
        }

        function appendMessageToContainer(text, sender, sageName = '') {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'user' ? 'user' : 'sage');
            const label = document.createElement('div');
            label.classList.add('sender-label');
            label.textContent = sender === 'user' ? 'Вы' : (sageName || 'Мудрец');
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            bubble.textContent = text;
            msgDiv.appendChild(label);
            msgDiv.appendChild(bubble);
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addMessageToCurrentChat(text, sender, sageName) {
            const chat = findChat(currentChatId);
            if (chat) {
                chat.messages.push({ text, sender, sageName });
                if (sender === 'user' && chat.title === 'Новый чат') {
                    chat.title = text.length > 30 ? text.substring(0, 30) + '...' : text;
                }
                saveChatsToStorage();
                renderChatList();
            }
        }

        function showLoading() {
            const loader = document.createElement('div');
            loader.classList.add('message', 'sage');
            loader.id = 'loader';
            const label = document.createElement('div');
            label.classList.add('sender-label');
            label.textContent = sages[currentSage]?.name || 'Мудрец';
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            bubble.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
            loader.appendChild(label);
            loader.appendChild(bubble);
            chatContainer.appendChild(loader);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        function removeLoading() {
            const l = document.getElementById('loader');
            if (l) l.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            const key = getApiKey();
            if (!key) {
                keyModal.style.display = 'flex';
                return;
            }
            appendMessageToContainer(text, 'user');
            addMessageToCurrentChat(text, 'user', 'Вы');
            userInput.value = '';
            showLoading();

            try {
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + key
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: 'system', content: sagePrompts[currentSage] },
                            ...findChat(currentChatId).messages.map(m => ({ role: m.sender === 'user' ? 'user' : 'assistant', content: m.text }))
                        ],
                        temperature: 0.8,
                        max_tokens: 350
                    })
                });
                const data = await resp.json();
                removeLoading();
                if (!resp.ok) throw new Error(data.error?.message || 'Ошибка');
                const reply = data.choices[0].message.content;
                appendMessageToContainer(reply, 'sage', sages[currentSage].name);
                addMessageToCurrentChat(reply, 'sage', sages[currentSage].name);
            } catch (e) {
                removeLoading();
                console.error(e);
                appendMessageToContainer('⚠️ Мудрец временно недоступен. Проверьте ключ или интернет.', 'sage', 'Система');
            }
        }

        currentSageBtn.addEventListener('click', () => {
            sageList.classList.toggle('show');
        });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.sage-dropdown')) {
                sageList.classList.remove('show');
            }
        });

        document.getElementById('collapseSidebarBtn').addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });
        document.getElementById('menuBtn').addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });

        newChatBtn.addEventListener('click', createNewChat);
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        if (getApiKey()) {
            keyModal.style.display = 'none';
        } else {
            keyModal.style.display = 'flex';
        }
        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem(STORAGE_KEY_API, key);
                keyModal.style.display = 'none';
            }
        });

        chats = loadChatsFromStorage();
        renderSageList();
        selectSage('islam');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js').catch(function(){});
            });
        }
    </script>
</body>
</html>
